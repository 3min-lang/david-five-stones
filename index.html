<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大衛的五顆石頭 ─ 互動關卡</title>
<style>
  :root{
    --bg:#0f1b2d; --panel:#16263d; --ink:#f4f7fb; --muted:#9fb3cc;
    --c-pray:#e5484d; --c-bible:#f5a623; --c-worship:#30a46c; --c-fellow:#3b82f6; --c-spirit:#8b5cf6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,#1e3454,#0f1b2d 60%);
    color:var(--ink); min-height:100%; overflow-x:hidden;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 64px;}
  header.top{text-align:center;margin:14px 0 26px;}
  header.top h1{font-size:clamp(26px,4.5vw,44px);margin:0;letter-spacing:2px;}
  header.top p{color:var(--muted);margin:8px 0 0;font-size:clamp(13px,2vw,17px);}
  .verse{color:#ffd479;font-weight:700;}

  .bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .btn{cursor:pointer;border:none;border-radius:999px;padding:10px 18px;font-size:15px;
       font-family:inherit;font-weight:700;color:#fff;background:#26405f;transition:.15s;}
  .btn:hover{filter:brightness(1.12);}
  .btn.ghost{background:transparent;border:1px solid #34537a;color:var(--muted);}
  .crumb{color:var(--muted);font-size:15px;}
  .crumb b{color:var(--ink);}

  .screen{display:none;animation:fade .25s ease;}
  .screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
  @media(max-width:640px){.cards{grid-template-columns:1fr;}}
  .card{position:relative;border-radius:22px;padding:34px 28px;cursor:pointer;color:#fff;
        min-height:160px;display:flex;flex-direction:column;justify-content:space-between;
        box-shadow:0 14px 34px rgba(0,0,0,.35);transition:.18s;overflow:hidden;}
  .card:hover{transform:translateY(-4px);box-shadow:0 20px 44px rgba(0,0,0,.5);}
  .card .stone{position:absolute;right:-10px;top:-18px;font-size:120px;opacity:.16;}
  .card .name{font-size:30px;font-weight:900;letter-spacing:3px;}
  .card .en{opacity:.85;font-size:15px;margin-top:2px;letter-spacing:1px;}
  .card .go{align-self:flex-end;font-size:15px;font-weight:700;opacity:.9;}
  .card.pray{background:linear-gradient(135deg,#e5484d,#a3262b);}
  .card.bible{background:linear-gradient(135deg,#f5a623,#c47b00);}
  .card.worship{background:linear-gradient(135deg,#30a46c,#1d6b46);}
  .card.fellow{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}
  .card.spirit{background:linear-gradient(135deg,#8b5cf6,#5b21b6);grid-column:1/-1;min-height:130px;}
  .card.spirit .badge{position:absolute;left:28px;bottom:26px;font-size:13px;opacity:.85;
        background:rgba(255,255,255,.16);padding:4px 12px;border-radius:999px;}

  .cat-title{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
  .dot{width:22px;height:22px;border-radius:50%;}
  .cat-title h2{margin:0;font-size:clamp(24px,4vw,34px);letter-spacing:2px;}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
  .choices.single{grid-template-columns:1fr;max-width:440px;margin:0 auto;}
  @media(max-width:640px){.choices{grid-template-columns:1fr;}}
  .choice{border-radius:20px;padding:40px 26px;cursor:pointer;text-align:center;
          background:var(--panel);border:2px solid #2b466a;transition:.18s;}
  .choice:hover{transform:translateY(-3px);border-color:var(--accent);}
  .choice .big{font-size:30px;font-weight:900;letter-spacing:3px;}
  .choice .sub{color:var(--muted);margin-top:8px;font-size:14px;}
  .choice .ico{font-size:46px;margin-bottom:8px;}

  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:560px;margin:0 auto;}
  @media(max-width:560px){.grid{gap:12px;}}
  .num{aspect-ratio:1/1;border-radius:18px;border:none;cursor:pointer;color:#fff;
       font-size:clamp(28px,7vw,46px);font-weight:900;font-family:inherit;
       display:flex;align-items:center;justify-content:center;position:relative;
       box-shadow:0 8px 20px rgba(0,0,0,.3);transition:.15s;}
  .num:hover{transform:translateY(-3px);filter:brightness(1.1);}
  .num.used{background:#33445c !important;color:#7e94ad !important;box-shadow:none;}
  .num.used::after{content:"已選";position:absolute;bottom:8px;font-size:13px;font-weight:700;letter-spacing:1px;}
  .num .check{position:absolute;top:6px;right:10px;font-size:18px;display:none;}
  .num.used .check{display:block;color:#5ad18f;}
  .legend{text-align:center;color:var(--muted);font-size:13px;margin-top:18px;}

  .overlay{position:fixed;inset:0;background:rgba(6,12,22,.72);backdrop-filter:blur(3px);
           display:none;align-items:center;justify-content:center;padding:22px;z-index:50;}
  .overlay.active{display:flex;animation:fade .2s ease;}
  .modal{background:var(--panel);border-radius:24px;max-width:680px;width:100%;
         max-height:90vh;overflow:auto;box-shadow:0 24px 60px rgba(0,0,0,.6);
         border-top:8px solid var(--accent);}
  .modal .mhead{display:flex;align-items:center;justify-content:space-between;padding:22px 26px 6px;}
  .modal .tag{display:inline-flex;align-items:center;gap:9px;font-weight:800;font-size:16px;}
  .modal .tag .mdot{width:16px;height:16px;border-radius:50%;}
  .modal .qno{background:var(--accent);color:#fff;border-radius:12px;padding:4px 14px;font-weight:900;font-size:20px;}
  .modal .body{padding:8px 26px 10px;}
  .modal h3{font-size:clamp(20px,3.4vw,26px);line-height:1.5;margin:14px 0 12px;}
  .recite{background:#0f2036;border:1px solid #2b466a;border-radius:14px;
          padding:16px 18px;line-height:2;font-size:17px;color:#e9eff7;margin:10px 0;}
  .cond{display:flex;gap:10px;align-items:flex-start;background:#13301f;border:1px solid #2c6a44;
        color:#bff0d2;border-radius:12px;padding:12px 16px;font-size:15px;margin-top:14px;line-height:1.7;}
  .cond.bible{background:#2e2410;border-color:#6a5320;color:#f3e0ad;}
  .cond.fellow{background:#142640;border-color:#2c4f87;color:#bcd5f7;}
  .toggleBox{margin-top:14px;}
  .toggleBox .togContent{display:none;}
  .toggleBox.show .togContent{display:block;}
  .ans{margin-top:10px;background:#2a1722;border:1px solid #6a2c45;color:#ffc4d8;
       border-radius:12px;padding:12px 16px;font-size:17px;line-height:1.8;}
  .ans.verse{background:#0f2036;border-color:#2b466a;color:#e9eff7;}
  audio{width:100%;margin-top:8px;}
  .audionote{color:var(--muted);font-size:13px;margin-top:8px;line-height:1.6;}
  .mfoot{padding:6px 26px 22px;text-align:center;}
  .x{cursor:pointer;font-size:26px;line-height:1;color:var(--muted);border:none;background:none;}
  .x:hover{color:#fff;}
  .resetbar{text-align:center;margin-top:30px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>🪨 大衛的五顆石頭</h1>
    <p>主題經文：撒母耳記上 17:4–49 ｜ <span class="verse">上帝賜的力量，使我得勝！</span></p>
  </header>

  <!-- ===== HOME ===== -->
  <section id="home" class="screen active">
    <div class="cards">
      <div class="card pray"    onclick="openCat(0)"><span class="stone">🙏</span><div><div class="name">禱告</div><div class="en">PRAYER</div></div><div class="go">點我進入 ➜</div></div>
      <div class="card bible"   onclick="openCat(1)"><span class="stone">📖</span><div><div class="name">聖經</div><div class="en">BIBLE</div></div><div class="go">點我進入 ➜</div></div>
      <div class="card worship" onclick="openCat(2)"><span class="stone">🎵</span><div><div class="name">敬拜</div><div class="en">WORSHIP</div></div><div class="go">點我進入 ➜</div></div>
      <div class="card fellow"  onclick="openCat(3)"><span class="stone">🤝</span><div><div class="name">教會團契</div><div class="en">FELLOWSHIP</div></div><div class="go">點我進入 ➜</div></div>
      <div class="card spirit"  onclick="openCat(4)"><span class="stone">🕊️</span><div><div class="name">聖靈的引導</div><div class="en">THE HOLY SPIRIT</div></div><span class="badge">只有「問題」</span><div class="go">點我進入 ➜</div></div>
    </div>
    <div class="resetbar"><button class="btn ghost" onclick="resetAll()">🔄 重設所有「已選」記錄</button></div>
  </section>

  <!-- ===== CATEGORY MENU ===== -->
  <section id="catmenu" class="screen">
    <div class="bar"><button class="btn" onclick="go('home')">⟵ 回主頁</button>
      <span class="crumb"><b id="cm-name"></b></span></div>
    <div class="cat-title"><span class="dot" id="cm-dot"></span><h2 id="cm-h2"></h2></div>
    <div class="choices" id="cm-choices">
      <div class="choice" id="ch-task" onclick="openGrid('task')">
        <div class="ico">🎯</div><div class="big">任務</div><div class="sub" id="ch-task-sub"></div></div>
      <div class="choice" id="ch-q" onclick="openGrid('q')">
        <div class="ico">❓</div><div class="big">問題</div><div class="sub">9 道題目，抽號作答</div></div>
    </div>
  </section>

  <!-- ===== NUMBER GRID ===== -->
  <section id="grid" class="screen">
    <div class="bar">
      <button class="btn" onclick="backToCat()">⟵ 上一步</button>
      <button class="btn ghost" onclick="clearCurrent()">🧹 清除此分類已選</button>
      <span class="crumb"><b id="g-name"></b> ／ <span id="g-type"></span></span>
    </div>
    <div class="cat-title"><span class="dot" id="g-dot"></span><h2 id="g-h2"></h2></div>
    <div class="grid" id="g-grid"></div>
    <div class="legend">點擊號碼查看內容；點過的號碼會變灰並標示「已選」。點錯了可用上方「清除此分類已選」。</div>
  </section>
</div>

<!-- ===== MODAL ===== -->
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal">
    <div class="mhead">
      <span class="tag"><span class="mdot" id="m-dot"></span><span id="m-tag"></span> <span class="qno" id="m-no"></span></span>
      <button class="x" onclick="closeModal()">✕</button>
    </div>
    <div class="body" id="m-body"></div>
    <div class="mfoot"><button class="btn ghost" onclick="closeModal()">⟵ 返回號碼選單</button></div>
  </div>
</div>

/* ---------- STATE ---------- */
let curCat=0, curType="task";
const KEY="stones_visited_v1";
let visited = JSON.parse(localStorage.getItem(KEY) || "{}");
function saveVisited(){ localStorage.setItem(KEY, JSON.stringify(visited)); }
function vkey(c,t,n){ return c+"_"+t+"_"+n; }

/* ---------- NAV ---------- */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'instant'});
}

function openCat(c){
  curCat=c; const d=DATA[c];
  document.documentElement.style.setProperty('--accent',d.color);
  document.getElementById('cm-name').textContent=d.name;
  document.getElementById('cm-h2').textContent=d.name;
  document.getElementById('cm-dot').style.background=d.color;
  const chTask=document.getElementById('ch-task');
  const choices=document.getElementById('cm-choices');
  if(d.noTask){
    chTask.style.display='none'; choices.classList.add('single');
  }else{
    chTask.style.display=''; choices.classList.remove('single');
    document.getElementById('ch-task-sub').textContent=d.taskLabel;
  }
  go('catmenu');
}

function openGrid(type){
  curType=type; const d=DATA[curCat];
  document.getElementById('g-name').textContent=d.name;
  document.getElementById('g-type').textContent = type==='task' ? '任務' : '問題';
  document.getElementById('g-h2').textContent = d.name + (type==='task'?' ─ 任務':' ─ 問題');
  document.getElementById('g-dot').style.background=d.color;
  const grid=document.getElementById('g-grid'); grid.innerHTML="";
  const count = type==='task' ? d.tasks.length : 9;
  for(let i=0;i<count;i++){
    const b=document.createElement('button');
    b.className='num'; b.style.background=d.color;
    b.innerHTML='<span class="check">✓</span>'+(i+1);
    if(visited[vkey(curCat,type,i)]) b.classList.add('used');
    b.onclick=()=>openItem(i,b);
    grid.appendChild(b);
  }
  go('grid');
}
function backToCat(){ openCat(curCat); }

function clearCurrent(){
  const d=DATA[curCat]; const type=curType;
  const count = type==='task' ? d.tasks.length : 9;
  if(!confirm('確定清除「'+d.name+' ─ '+(type==='task'?'任務':'問題')+'」的所有已選記錄嗎？')) return;
  for(let i=0;i<count;i++) delete visited[vkey(curCat,type,i)];
  saveVisited(); openGrid(type);
}

/* ---------- MODAL ---------- */
function tog(btn){ btn.parentElement.classList.toggle('show'); }

function openItem(i,btn){
  const d=DATA[curCat];
  visited[vkey(curCat,curType,i)] = true; saveVisited();
  if(btn) btn.classList.add('used');

  document.documentElement.style.setProperty('--accent',d.color);
  document.getElementById('m-dot').style.background=d.color;
  document.getElementById('m-tag').textContent = d.name + (curType==='task'?' · 任務':' · 問題');
  document.getElementById('m-no').textContent = (i+1);
  const body=document.getElementById('m-body');
  let html='';

  if(curType!=='task'){ /* ----- 問題 ----- */
    const item=d.questions[i];
    if(!item){ html='<h3 class="todo">（此題待補充）</h3>'; }
    else{
      html='<h3>'+item.q+'</h3>'+
        '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏答案</button>'+
        '<div class="togContent"><div class="ans">✅ '+item.a+'</div></div></div>';
    }
  } else if(curCat===0){ /* ----- 禱告 背誦（經文預設遮起） ----- */
    const t=d.tasks[i];
    html='<h3>'+t.title+'</h3>'+
      '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">👁 點擊顯示／隱藏經文</button>'+
      '<div class="togContent"><div class="recite">'+t.recite+'</div></div></div>'+
      '<div class="cond">🎯 '+t.cond+'</div>';
  } else if(curCat===1){ /* ----- 聖經 經文快閃（打馬賽克） ----- */
    const t=d.tasks[i];
    html='<h3>📖 經文快閃 '+(i+1)+'</h3>'+
      '<div class="recite">'+t.masked+'</div>'+
      '<div class="cond bible">🎯 '+d.bibleCond+'</div>'+
      '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏完整經文</button>'+
      '<div class="togContent"><div class="ans verse"><b>'+t.ref+'</b><br>'+t.full+'</div></div></div>';
  } else if(curCat===2){ /* ----- 敬拜 猜歌 ----- */
    const t=d.tasks[i]; const n=i+1;
    html='<h3>🎧 聽前奏，猜歌名！</h3>'+
      '<audio controls preload="none" src="audio/敬拜_'+n+'.m4a"></audio>'+
      '<p class="audionote">音檔：<b>敬拜_'+n+'.m4a</b>（放在 audio 資料夾）。若沒聲音請確認檔名與號碼相符。</p>'+
      '<div class="cond">🎯 完成條件：猜對歌名。</div>'+
      '<div class="toggleBox"><button class="btn ghost" onclick="tog(this)">關主：顯示／隱藏歌名</button>'+
      '<div class="togContent"><div class="ans">🎵 '+t.song+'</div></div></div>';
  } else { /* ----- 教會團契 你了解隊友嗎 ----- */
    const t=d.tasks[i];
    html='<h3>'+t.title+'</h3>'+
      '<div class="recite" style="font-size:21px;text-align:center;">'+t.q+'</div>'+
      '<div class="cond fellow">🎯 '+t.cond+'</div>';
  }

  body.innerHTML=html;
  document.getElementById('overlay').classList.add('active');
}
function closeModal(){
  document.getElementById('overlay').classList.remove('active');
  if(document.getElementById('grid').classList.contains('active')) openGrid(curType);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModal(); });

/* ---------- RESET ALL ---------- */
function resetAll(){
  if(confirm('確定要清除「所有分類」的已選記錄嗎？')){
    visited={}; saveVisited(); alert('已重設！');
  }
}
